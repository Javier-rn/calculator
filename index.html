<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>
        <div class="div4"></div>
        <div class="div5"></div>

        <div class="container">
            <div class="display">0</div>
            <div class="bottom">
                <div class="numbers">
                    <div id="1" class="one square btn">1</div>
                    <div id="2" class="two square btn">2</div>
                    <div id="3" class="three square btn">3</div>
                    <div id="4" class="four square btn">4</div>
                    <div id="5" class="five square btn">5</div>
                    <div id="6" class="six square btn">6</div>
                    <div id="7" class="seven square btn">7</div>
                    <div id="8" class="eight square btn">8</div>
                    <div id="9" class="nine square btn">9</div>
                    <div id="0" class="zero square btn">0</div>
                    <div id="clear" class="clear square">Clear</div>
                    <div id="equal" class="equal square">=</div>
                </div>
                <div class="operations">
                    <div id="+" class="operation add square">+</div>
                    <div id="-" class="operation subtract square">-</div>
                    <div id="*" class="operation multiply square">*</div>
                    <div id="/" class="operation divide square">/</div>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
