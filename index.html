<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <h1>Calculator</h1>

        <div class="container">
            <div class="display">0</div>
            <div class="bottom">
                <div class="numbers">
                    <div id="1" class="one square btn">1</div>
                    <div id="2" class="two square btn">2</div>
                    <div id="3" class="three square btn">3</div>
                    <div id="4" class="four square btn">4</div>
                    <div id="5" class="five square btn">5</div>
                    <div id="6" class="six square btn">6</div>
                    <div id="7" class="seven square btn">7</div>
                    <div id="8" class="eight square btn">8</div>
                    <div id="9" class="nine square btn">9</div>
                    <div id="0" class="zero square btn">0</div>
                    <div id="clear" class="clear square">Clear</div>
                    <div id="equal" class="equal square">=</div>
                </div>
                <div class="operations">
                    <div id="add" class="operation add square btn">+</div>
                    <div id="subtract" class="operation subtract square btn">
                        -
                    </div>
                    <div id="multiply" class="operation multiply square btn">
                        *
                    </div>
                    <div id="divide" class="operation divide square btn">/</div>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
